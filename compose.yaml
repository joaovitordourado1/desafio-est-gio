services:
  database:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: agilize
      POSTGRES_PASSWORD: agilize
      POSTGRES_DB: banco_agilize
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agilize -d banco_agilize"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://agilize:agilize@database:5432/banco_agilize?schema=public
      PORT: 3000
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:5173}"
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://127.0.0.1:3000/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: "${VITE_API_URL:-http://localhost:3000}"
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
