services:
  database:
    image: postgres:18-alpine

    environment:
      POSTGRES_USER: agilize
      POSTGRES_PASSWORD: agilize
      POSTGRES_DB: banco_agilize

    ports:
      - "5434:5432"

    volumes:
      - postgres_data:/var/lib/postgresql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agilize -d banco_agilize"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: